<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mcp-probe — LegionForge</title>
<link rel="icon" href="https://assets.legionforge.org/current/icons/favicon.svg" type="image/svg+xml">
<link rel="icon" href="https://assets.legionforge.org/current/icons/favicon.ico" sizes="any">
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --surface2: #21262d;
    --border: #30363d; --text: #e6edf3; --muted: #8b949e;
    --pass: #3fb950; --fail: #f85149; --warn: #d29922; --skip: #58a6ff;
    --accent: #58a6ff; --accent-dim: #1f6feb33;
    --font: 'Inter', system-ui, -apple-system, sans-serif;
    --mono: 'JetBrains Mono', 'Fira Code', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; line-height: 1.5; }

  /* ── Layout ── */
  .layout { display: grid; grid-template-columns: 260px 1fr; grid-template-rows: 56px 1fr; height: 100vh; }
  .topbar { grid-column: 1/-1; display: flex; align-items: center; gap: 12px; padding: 0 20px; background: var(--surface); border-bottom: 1px solid var(--border); }
  .sidebar { background: var(--surface); border-right: 1px solid var(--border); overflow-y: auto; padding: 12px 0; }
  .main { overflow-y: auto; padding: 24px; }

  /* ── Topbar ── */
  .logo { font-weight: 700; font-size: 18px; color: var(--text); letter-spacing: -0.3px; display: inline; }
  .logo span { color: var(--accent); }
  .tagline { color: var(--muted); font-size: 12px; margin-left: 8px; display: inline; }
  .spacer { flex: 1; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: background 0.15s; }
  .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary:hover { background: #79c0ff; }
  .btn-primary:focus-visible { outline-color: #000; }
  .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--border); }
  .btn:disabled { opacity: 0.5; cursor: default; }
  .spin { display: inline-block; animation: spin 1s linear infinite; }
  @media (prefers-reduced-motion: reduce) { .spin { animation: none; } }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Sidebar nav ── */
  .nav-section { padding: 4px 12px 8px; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 16px; cursor: pointer; border-radius: 4px; transition: background 0.1s; font-size: 13px; color: var(--muted); margin: 2px 8px; }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }
  .nav-item.active { background: var(--accent-dim); color: var(--accent); border-right: 2px solid var(--accent); }
  @media (prefers-contrast: more) { .nav-item { border: 1px solid var(--border); } }
  .nav-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
  .nav-dot.pass { background: var(--pass); }
  .nav-dot.fail { background: var(--fail); }
  .nav-dot.warn { background: var(--warn); }
  .nav-dot.pending { background: var(--muted); border: 1px solid var(--border); }

  /* ── Cards ── */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 16px; overflow: hidden; }
  .card-header { display: flex; align-items: center; gap: 12px; padding: 14px 18px; border-bottom: 1px solid var(--border); }
  .card-title { font-weight: 600; font-size: 14px; }
  .card-subtitle { color: var(--muted); font-size: 12px; font-family: var(--mono); }
  .card-body { padding: 16px 18px; }

  /* ── Status badges ── */
  .badge { display: inline-flex; align-items: center; gap: 5px; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge-pass { background: #1a3a22; color: var(--pass); }
  .badge-fail { background: #3a1a1a; color: var(--fail); }
  .badge-warn { background: #3a2a10; color: var(--warn); }
  .badge-skip { background: #1a2a3a; color: var(--skip); }
  .badge-pending { background: var(--surface2); color: var(--muted); }

  /* ── Check list ── */
  .check-list { display: flex; flex-direction: column; gap: 4px; }
  .check-row { display: flex; align-items: flex-start; gap: 10px; padding: 8px 10px; border-radius: 6px; }
  .check-row:hover { background: var(--surface2); }
  .check-icon { width: 16px; flex-shrink: 0; text-align: center; font-size: 13px; margin-top: 1px; }
  .check-icon.pass { color: var(--pass); }
  .check-icon.fail { color: var(--fail); }
  .check-icon.warn { color: var(--warn); }
  .check-icon.skip { color: var(--skip); }
  .check-msg { font-size: 13px; flex: 1; }
  .check-detail { color: var(--muted); font-size: 11px; font-family: var(--mono); margin-top: 2px; }

  /* ── Client wiring grid ── */
  .wiring-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .wiring-table th { padding: 8px 12px; text-align: left; color: var(--muted); font-weight: 500; border-bottom: 1px solid var(--border); }
  .wiring-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .wiring-table tr:last-child td { border-bottom: none; }
  .wiring-table tr:hover td { background: var(--surface2); }
  .client-name { font-weight: 500; }
  .client-not-installed { color: var(--muted); font-style: italic; }
  .wiring-cells { display: flex; gap: 6px; flex-wrap: wrap; }
  .wiring-pill { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-family: var(--mono); }
  .wiring-pill.ok { background: #1a3a22; color: var(--pass); }
  .wiring-pill.missing { background: #3a1a1a; color: var(--fail); }
  .wiring-pill.na { background: var(--surface2); color: var(--muted); }

  /* ── Recommendations ── */
  .rec-card { border-left: 3px solid; padding: 12px 16px; border-radius: 0 6px 6px 0; margin-bottom: 10px; background: var(--surface); }
  .rec-card.required { border-color: var(--fail); }
  .rec-card.suggested { border-color: var(--warn); }
  .rec-card.optional { border-color: var(--skip); }
  .rec-title { font-weight: 600; font-size: 13px; margin-bottom: 4px; }
  .rec-desc { color: var(--muted); font-size: 12px; margin-bottom: 8px; }
  .rec-snippet { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; font-family: var(--mono); font-size: 11px; color: var(--text); white-space: pre; overflow-x: auto; margin-bottom: 8px; }
  .rec-severity { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
  .rec-severity.required { color: var(--fail); }
  .rec-severity.suggested { color: var(--warn); }
  .rec-severity.optional { color: var(--skip); }

  /* ── Discovery ── */
  .runtime-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; }
  .runtime-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 10px 14px; }
  .runtime-name { font-weight: 600; font-size: 13px; }
  .runtime-ver { font-family: var(--mono); font-size: 11px; color: var(--pass); }
  .runtime-missing { font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .runtime-relevance { color: var(--muted); font-size: 11px; margin-top: 4px; }

  /* ── Empty state ── */
  .empty { text-align: center; padding: 48px 24px; color: var(--muted); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-title { font-weight: 600; font-size: 15px; color: var(--text); margin-bottom: 6px; }
  .empty-sub { font-size: 13px; }

  /* ── Misc ── */
  .section-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  .section-sub { color: var(--muted); font-size: 13px; margin-bottom: 20px; }
  .tab-bar { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
  .tab { padding: 8px 16px; cursor: pointer; font-size: 13px; color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -1px; border-radius: 4px; }
  .tab:hover { color: var(--text); }
  .tab:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .summary-row { display: flex; gap: 16px; margin-bottom: 20px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 20px; flex: 1; }
  .stat-value { font-size: 28px; font-weight: 700; }
  .stat-label { color: var(--muted); font-size: 12px; }
  .stat-card.fail .stat-value { color: var(--fail); }
  .stat-card.pass .stat-value { color: var(--pass); }
  .stat-card.warn .stat-value { color: var(--warn); }
  .hidden { display: none; }
  .timestamp { color: var(--muted); font-size: 11px; font-family: var(--mono); }

  /* ── Attribution ── */
  .attribution { color: var(--muted); font-size: 10px; display: flex; align-items: center; gap: 4px; margin-top: 2px; }
  .attribution img { height: 16px; width: auto; opacity: 1; }
  .attribution a { color: inherit; text-decoration: none; }
  .attribution a:hover { color: var(--accent); }
  .attribution a:focus-visible { outline: 1px solid var(--accent); outline-offset: 1px; }
</style>
</head>
<body>

<div class="layout">
  <!-- Topbar -->
  <header class="topbar">
    <div>
      <div class="logo">mcp<span>-probe</span></div>
      <div class="tagline">MCP Analysis & Configuration Advisor</div>
      <div class="attribution">
        by <a href="https://legionforge.org" target="_blank" rel="noopener" aria-label="LegionForge">
          <img src="https://assets.legionforge.org/current/logos/legionforge-logo-transparent.png" alt="" aria-hidden="true">
          LegionForge
        </a>
      </div>
    </div>
    <div class="spacer"></div>
    <span id="last-run" class="timestamp" role="status" aria-live="polite" aria-label="Last analysis run time"></span>
    <button class="btn btn-primary" id="btn-run" aria-label="Run analysis">
      <span id="run-icon" aria-hidden="true">▶</span> Run Analysis
    </button>
  </header>

  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="nav-section">Views</div>
    <div class="nav-item active" data-view="overview" onclick="setView('overview')">
      <div class="nav-dot" id="dot-overview"></div> Overview
    </div>

    <div class="nav-section" style="margin-top:8px">Servers</div>
    <div id="server-nav"></div>

    <div class="nav-section" style="margin-top:8px">Tools</div>
    <div class="nav-item" data-view="clients" onclick="setView('clients')">
      <div class="nav-dot" id="dot-clients"></div> Client Wiring
    </div>
    <div class="nav-item" data-view="recommendations" onclick="setView('recommendations')">
      <div class="nav-dot" id="dot-recommendations"></div> Recommendations
    </div>
    <div class="nav-item" data-view="discovery" onclick="setView('discovery')">
      <div class="nav-dot"></div> Discovery
    </div>
  </nav>

  <!-- Main content -->
  <main class="main" id="main-content">
    <div class="empty">
      <div class="empty-icon">🔍</div>
      <div class="empty-title">Ready to analyze</div>
      <div class="empty-sub">Click <strong>Run Analysis</strong> to probe servers and audit client wiring</div>
    </div>
  </main>
</div>

<script>
let state = null;
let currentView = 'overview';
let selectedServer = null;

// ── API ────────────────────────────────────────────────────────────────────────
async function runAnalysis() {
  const btn = document.getElementById('btn-run');
  const icon = document.getElementById('run-icon');
  btn.disabled = true;
  icon.textContent = '⏳';
  icon.classList.add('spin');

  try {
    const res = await fetch('/api/analyze', { method: 'POST' });
    state = await res.json();
    render();
    const ts = new Date(state.timestamp).toLocaleTimeString();
    document.getElementById('last-run').textContent = `Last run: ${ts}`;
  } catch (e) {
    alert('Analysis failed: ' + e.message);
  } finally {
    btn.disabled = false;
    icon.textContent = '▶';
    icon.classList.remove('spin');
  }
}

document.getElementById('btn-run').addEventListener('click', runAnalysis);

// ── Rendering ─────────────────────────────────────────────────────────────────
function setView(view, serverName) {
  currentView = view;
  selectedServer = serverName || null;
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.view === view);
  });
  render();
}

function statusBadge(passed, failed, warned) {
  if (failed > 0) return `<span class="badge badge-fail">✗ ${failed} failed</span>`;
  if (warned > 0) return `<span class="badge badge-warn">⚠ ${warned} warnings</span>`;
  return `<span class="badge badge-pass">✓ ${passed} passed</span>`;
}

function checkIcon(status) {
  const icons = { pass: '✓', fail: '✗', warn: '⚠', skip: '─' };
  return `<span class="check-icon ${status}">${icons[status] || '?'}</span>`;
}

function render() {
  if (!state) return;
  buildServerNav();

  const views = { overview, clients, recommendations, discovery };
  if (currentView === 'server' && selectedServer) {
    renderServer(selectedServer);
  } else if (views[currentView]) {
    views[currentView]();
  }
}

function buildServerNav() {
  const nav = document.getElementById('server-nav');
  nav.innerHTML = state.probes.map(p => {
    const dot = p.failed > 0 ? 'fail' : p.warned > 0 ? 'warn' : 'pass';
    const active = currentView === 'server' && selectedServer === p.server;
    return `<div class="nav-item ${active ? 'active' : ''}" data-view="server" data-server="${escHtml(p.server)}" onclick="setView('server', this.dataset.server)">
      <div class="nav-dot ${dot}"></div> ${escHtml(p.server)}
    </div>`;
  }).join('');
}

function overview() {
  const totalFail = state.probes.reduce((s, p) => s + p.failed, 0);
  const totalPass = state.probes.reduce((s, p) => s + p.passed, 0);
  const totalRecs = state.recommendations.length;
  const reqRecs = state.recommendations.filter(r => r.severity === 'required').length;

  const wiringIssues = state.audit.reduce((s, c) => {
    return s + Object.values(c.serverWiring).filter(w => !w.configured && c.installed).length;
  }, 0);

  document.getElementById('main-content').innerHTML = `
    <div class="section-title">Overview</div>
    <div class="section-sub">${state.probes.length} server(s) analyzed across ${state.discovery.clients.length} client types</div>

    <div class="summary-row">
      <div class="stat-card ${totalFail > 0 ? 'fail' : 'pass'}">
        <div class="stat-value">${totalFail > 0 ? totalFail : totalPass}</div>
        <div class="stat-label">${totalFail > 0 ? 'Protocol failures' : 'Protocol checks passed'}</div>
      </div>
      <div class="stat-card ${wiringIssues > 0 ? 'fail' : 'pass'}">
        <div class="stat-value">${wiringIssues}</div>
        <div class="stat-label">Client wiring gaps</div>
      </div>
      <div class="stat-card ${reqRecs > 0 ? 'warn' : 'pass'}">
        <div class="stat-value">${reqRecs}</div>
        <div class="stat-label">Required actions</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${state.discovery.clients.filter(c => c.installed).length}</div>
        <div class="stat-label">AI clients installed</div>
      </div>
    </div>

    <div class="card">
      <div class="card-header"><span class="card-title">Servers</span></div>
      <div class="card-body">
        ${state.probes.map(p => `
          <div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer" data-server="${escHtml(p.server)}" onclick="setView('server', this.dataset.server)">
            <div style="flex:1">
              <div style="font-weight:600">${escHtml(p.server)}</div>
              <div style="color:var(--muted);font-size:11px;font-family:var(--mono)">${escHtml(p.url)} · ${escHtml(p.transport)}</div>
            </div>
            ${statusBadge(p.passed, p.failed, p.warned)}
            <span style="color:var(--muted);font-size:12px">→</span>
          </div>
        `).join('')}
      </div>
    </div>

    ${reqRecs > 0 ? `
    <div class="card">
      <div class="card-header"><span class="card-title">⚠ Required Actions</span></div>
      <div class="card-body">
        ${state.recommendations.filter(r => r.severity === 'required').slice(0, 3).map(r => `
          <div class="rec-card required" style="margin-bottom:8px">
            <div class="rec-title">${escHtml(r.title)}</div>
            <div class="rec-desc">${escHtml(r.description)}</div>
          </div>
        `).join('')}
        ${reqRecs > 3 ? `<div style="color:var(--muted);font-size:12px;margin-top:8px">+${reqRecs - 3} more — see Recommendations</div>` : ''}
      </div>
    </div>` : ''}
  `;
}

function renderServer(serverName) {
  const probe = state.probes.find(p => p.server === serverName);
  if (!probe) return;

  document.getElementById('main-content').innerHTML = `
    <div class="section-title">${escHtml(probe.server)}</div>
    <div class="section-sub" style="font-family:var(--mono)">${escHtml(probe.url)} · ${escHtml(probe.transport)} · ${escHtml(new Date(probe.timestamp).toLocaleTimeString())}</div>

    <div class="summary-row">
      <div class="stat-card pass"><div class="stat-value">${probe.passed}</div><div class="stat-label">Passed</div></div>
      <div class="stat-card ${probe.failed > 0 ? 'fail' : 'pass'}"><div class="stat-value">${probe.failed}</div><div class="stat-label">Failed</div></div>
      <div class="stat-card ${probe.warned > 0 ? 'warn' : 'pass'}"><div class="stat-value">${probe.warned}</div><div class="stat-label">Warnings</div></div>
      <div class="stat-card"><div class="stat-value">${probe.skipped}</div><div class="stat-label">Skipped</div></div>
    </div>

    <div class="card">
      <div class="card-header">
        <span class="card-title">Protocol Checks</span>
        ${statusBadge(probe.passed, probe.failed, probe.warned)}
      </div>
      <div class="card-body">
        <div class="check-list">
          ${probe.checks.map(c => `
            <div class="check-row">
              ${checkIcon(c.status)}
              <div>
                <div class="check-msg">${escHtml(c.message)}</div>
                ${c.detail ? `<div class="check-detail">${escHtml(c.detail)}</div>` : ''}
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    </div>

    ${probe.tools.length > 0 ? `
    <div class="card">
      <div class="card-header"><span class="card-title">Tools (${probe.tools.length})</span></div>
      <div class="card-body" style="display:flex;flex-wrap:wrap;gap:8px">
        ${probe.tools.map(t => `<span class="badge badge-pass">${escHtml(t)}</span>`).join('')}
      </div>
    </div>` : ''}
  `;
}

function clients() {
  const installed = state.audit.filter(c => c.installed);
  const notInstalled = state.audit.filter(c => !c.installed);
  const serverNames = state.probes.map(p => p.server);

  document.getElementById('main-content').innerHTML = `
    <div class="section-title">Client Wiring</div>
    <div class="section-sub">Shows which AI clients have each MCP server configured</div>

    <div class="card">
      <div class="card-header"><span class="card-title">Installed Clients</span></div>
      <table class="wiring-table">
        <thead>
          <tr>
            <th>Client</th>
            ${serverNames.map(s => `<th>${escHtml(s)}</th>`).join('')}
            <th>Config Path</th>
          </tr>
        </thead>
        <tbody>
          ${installed.map(c => `
            <tr>
              <td class="client-name">${escHtml(c.displayName)}</td>
              ${serverNames.map(s => {
                const w = c.serverWiring[s];
                if (!w) return `<td><span class="wiring-pill na">N/A</span></td>`;
                const cls = w.configured ? 'ok' : 'missing';
                const label = w.configured ? (w.processRunning ? '✓ live' : '✓ config') : '✗ missing';
                return `<td><span class="wiring-pill ${cls}">${label}</span></td>`;
              }).join('')}
              <td style="color:var(--muted);font-size:11px;font-family:var(--mono)">${c.configPath ? escHtml(c.configPath.replace(/^\/Users\/[^/]+\//, '~/').replace(/^\/home\/[^/]+\//, '~/')) : '—'}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>

    ${notInstalled.length > 0 ? `
    <div class="card">
      <div class="card-header"><span class="card-title">Not Installed</span></div>
      <div class="card-body" style="display:flex;flex-wrap:wrap;gap:8px">
        ${notInstalled.map(c => `<span class="badge badge-skip">${escHtml(c.displayName)}</span>`).join('')}
      </div>
    </div>` : ''}
  `;
}

function recommendations() {
  const recs = state.recommendations;
  document.getElementById('main-content').innerHTML = `
    <div class="section-title">Recommendations</div>
    <div class="section-sub">${recs.length} action(s) identified</div>

    ${recs.length === 0 ? `
      <div class="empty">
        <div class="empty-icon">✓</div>
        <div class="empty-title">All good!</div>
        <div class="empty-sub">No configuration issues detected</div>
      </div>
    ` : recs.map(r => `
      <div class="rec-card ${r.severity}">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
          <span class="rec-severity ${r.severity}">${r.severity}</span>
          <span style="color:var(--muted);font-size:11px">→ ${escHtml(r.client)} · ${escHtml(r.server)}</span>
        </div>
        <div class="rec-title">${escHtml(r.title)}</div>
        <div class="rec-desc">${escHtml(r.description)}</div>
        ${r.configSnippet ? `<pre class="rec-snippet">${escHtml(r.configSnippet)}</pre>` : ''}
      </div>
    `).join('')}
  `;
}

function discovery() {
  const { clients, runtimes } = state.discovery;
  document.getElementById('main-content').innerHTML = `
    <div class="section-title">System Discovery</div>
    <div class="section-sub">Detected AI clients and MCP runtimes on this machine</div>

    <div class="card">
      <div class="card-header"><span class="card-title">Runtimes & Package Managers</span></div>
      <div class="card-body">
        <div class="runtime-grid">
          ${runtimes.map(r => `
            <div class="runtime-card">
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
                <div class="runtime-name">${escHtml(r.name)}</div>
                ${r.available
                  ? `<span class="runtime-ver">${escHtml(r.version.split('\n')[0].replace('node ', 'v'))}</span>`
                  : `<span class="runtime-missing">not found</span>`}
              </div>
              <div class="runtime-relevance">${escHtml(r.mcpRelevance)}</div>
            </div>
          `).join('')}
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header"><span class="card-title">AI Clients</span></div>
      <div class="card-body">
        <div style="display:flex;flex-direction:column;gap:6px">
          ${clients.map(c => `
            <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
              <span class="badge ${c.installed ? 'badge-pass' : 'badge-skip'}">${c.installed ? '✓' : '─'}</span>
              <div>
                <div style="font-weight:500">${escHtml(c.displayName)}</div>
                ${c.installed && c.configPath ? `<div style="color:var(--muted);font-size:11px;font-family:var(--mono)">${escHtml(c.configPath)}</div>` : ''}
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Auto-run on load
runAnalysis();
</script>

</body>
</html>
